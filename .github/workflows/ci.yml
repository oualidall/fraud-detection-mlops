name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip          # re-uses the pip wheel cache between runs

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Test
        run: pytest -q
        env:
          # Minimal env so pydantic-settings does not need a .env file
          MLFLOW_TRACKING_URI: "file:./mlruns"
          MODEL_NAME: "xgboost"
          MLFLOW_EXPERIMENT_NAME: "fraud-detection"
